spring:
  application:
    name: gateway-sv
  profiles:
    active: ${SPRING_ACTIVE_PROFILE:dev}

  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - http://localhost:4200
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
              - OPTIONS
            allowedHeaders:
              - Authorization
              - Content-Type
            allowCredentials: true

      routes:

        # =========================
        # SWAGGER / OPENAPI
        # =========================

        - id: brands-swagger
          uri: http://brand-sv:8080
          predicates:
            - Path=/api/v1/brands/v3/api-docs
          filters:
            - StripPrefix=3

        - id: categories-swagger
          uri: http://category-sv:8080
          predicates:
            - Path=/api/v1/categories/v3/api-docs
          filters:
            - StripPrefix=3

        - id: suppliers-swagger
          uri: http://supplier-sv:8080
          predicates:
            - Path=/api/v1/suppliers/v3/api-docs
          filters:
            - StripPrefix=3

        - id: products-swagger
          uri: http://product-sv:8080
          predicates:
            - Path=/api/v1/products/v3/api-docs
          filters:
            - StripPrefix=3

        - id: price-items-swagger
          uri: http://price-item-sv:8080
          predicates:
            - Path=/api/v1/price-items/v3/api-docs
          filters:
            - StripPrefix=3

        - id: pricing-swagger
          uri: http://pricing-sv:8080
          predicates:
            - Path=/api/v1/pricing/v3/api-docs
          filters:
            - StripPrefix=3

        - id: customers-swagger
          uri: http://customer-sv:8080
          predicates:
            - Path=/api/v1/customers/v3/api-docs
          filters:
            - StripPrefix=3

        - id: sales-swagger
          uri: http://sales-sv:8080
          predicates:
            - Path=/api/v1/sales/v3/api-docs
          filters:
            - StripPrefix=3

        - id: exchange-swagger
          uri: http://exchange-sv:8080
          predicates:
            - Path=/api/v1/exchange/v3/api-docs
          filters:
            - StripPrefix=3

        # =========================
        # BUSINESS ROUTES
        # =========================

        - id: brands
          uri: http://brand-sv:8080
          predicates:
            - Path=/api/v1/brands/**

        - id: categories
          uri: http://category-sv:8080
          predicates:
            - Path=/api/v1/categories/**

        - id: suppliers
          uri: http://supplier-sv:8080
          predicates:
            - Path=/api/v1/suppliers/**

        - id: images
          uri: http://image-sv:8080
          predicates:
            - Path=/api/v1/images/**

        - id: price-items
          uri: http://price-item-sv:8080
          predicates:
            - Path=/api/v1/price-items/**

        - id: products
          uri: http://product-sv:8080
          predicates:
            - Path=/api/v1/products/**

        - id: pricing
          uri: http://pricing-sv:8080
          predicates:
            - Path=/api/v1/pricing/**

        - id: customers
          uri: http://customer-sv:8080
          predicates:
            - Path=/api/v1/customers/**

        - id: inventory
          uri: http://inventory-sv:8080
          predicates:
            - Path=/api/v1/inventory/**

        - id: sales
          uri: http://sales-sv:8080
          predicates:
            - Path=/api/v1/sales/**

        - id: exchange
          uri: http://exchange-sv:8080
          predicates:
            - Path=/api/v1/exchange/**

        - id: branches
          uri: http://branch-sv:8080
          predicates:
            - Path=/api/v1/branches/**

        - id: locations
          uri: http://location-sv:8080
          predicates:
            - Path=/api/v1/locations/**

        - id: tenants
          uri: http://tenant-sv:8080
          predicates:
            - Path=/api/v1/tenants/**

        - id: supplier-catalog
          uri: http://supplier-catalog-sv:8080
          predicates:
            - Path=/api/v1/supplier-catalog/**

        - id: purchases
          uri: http://purchase-sv:8080
          predicates:
            - Path=/api/v1/purchases/**

        - id: cash
          uri: http://cash-sv:8080
          predicates:
            - Path=/api/v1/cash/**

        - id: identity
          uri: http://identity-sv:8080
          predicates:
            - Path=/api/v1/identity/**

        - id: reporting
          uri: http://reporting-sv:8080
          predicates:
            - Path=/api/v1/reporting/**

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    disable-swagger-default-url: true
    deepLinking: true
    urls:
      - name: Brands
