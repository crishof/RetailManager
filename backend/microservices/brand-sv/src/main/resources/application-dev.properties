# =========================================
# DEVELOPMENT PROFILE - Application Properties
# =========================================
# Override application.properties for development
# This profile is used when running from IDE: -Dspring.profiles.active=dev

# =========================================
# DATABASE - PostgreSQL (Docker)
# =========================================
spring.datasource.url=jdbc:postgresql://localhost:5544/${BRAND_DB:brand_db}
spring.datasource.username=${POSTGRES_USER:retailmanager}
spring.datasource.password=${POSTGRES_PASSWORD:RetailMgr2024!}

# =========================================
# RABBITMQ (Docker)
# =========================================
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# =========================================
# LOGGING - Development (verbose)
# =========================================
logging.level.root=INFO
logging.level.org.springframework=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# =========================================
# JPA / HIBERNATE - Development
# =========================================
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# =========================================
# ACTUATOR - Development
# =========================================
management.endpoint.health.show-details=always
management.endpoints.web.exposure.include=health,info,metrics,prometheus,env
