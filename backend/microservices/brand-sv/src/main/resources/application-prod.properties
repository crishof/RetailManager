# =========================================
# PRODUCTION PROFILE - Application Properties
# =========================================
# Override application.properties for production
# This profile is used in Docker containers

# =========================================
# DATABASE - PostgreSQL (Docker Network)
# =========================================
spring.datasource.url=jdbc:postgresql://${POSTGRES_NETWORK_HOST:postgres}:${POSTGRES_CONTAINER_PORT:5432}/${BRAND_DB:brand_db}
spring.datasource.username=${POSTGRES_USER:retailmanager}
spring.datasource.password=${POSTGRES_PASSWORD:RetailMgr2024!}

# =========================================
# RABBITMQ (Docker Network)
# =========================================
spring.rabbitmq.host=${RABBITMQ_NETWORK_HOST:rabbitmq}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# =========================================
# LOGGING - Production (minimal)
# =========================================
logging.level.root=WARN
logging.level.org.springframework=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=WARN

# =========================================
# JPA / HIBERNATE - Production
# =========================================
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# =========================================
# ACTUATOR - Production
# =========================================
management.endpoint.health.show-details=when_authorized
management.endpoints.web.exposure.include=health,info,metrics,prometheus
