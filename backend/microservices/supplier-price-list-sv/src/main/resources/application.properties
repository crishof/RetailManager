# =========================================
# APP SETTINGS
# =========================================
spring.application.name=supplier-price-list-sv
server.port=8080
spring.profiles.active=${SPRING_ACTIVE_PROFILE:dev}
# =========================================
# DATASOURCE / POSTGRESQL
# =========================================
spring.datasource.url=${POSTGRES_URL}${POSTGRES_DB}
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database=POSTGRESQL
spring.sql.init.platform=postgres
# =========================================
# JPA / HIBERNATE
# =========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.open-in-view=false
# =========================================
# LOGGING
# =========================================
logging.level.org.springframework=info
logging.level.org.hibernate.SQL=warn
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=trace
# =========================================
# ACTUATOR / MONITORING
# =========================================
# Custom base path because nginx routes by service name
#management.endpoints.web.base-path=/price-items/actuator
# Exposed endpoints
management.endpoints.web.exposure.include=health,info,metrics,prometheus
# Health details always visible (may restrict later)
management.endpoint.health.show-details=always
# Enable exposing env info inside /info
management.info.env.enabled=true
# =========================================
# APPLICATION INFO (shown in /actuator/info)
# =========================================
info.app.name=Price items Service
info.app.description=Manages suppliers price items
info.app.version=1.0.0
# =========================================
# SPRINGDOC / OPENAPI SWAGGER
# =========================================
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
# =========================
# MULTIPART / UPLOAD LIMITS
# =========================
# Increase max file size and max request size to allow larger excel imports (default was 1MB)
# You can override these values via environment variables (e.g. SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
# If running behind a reverse proxy (nginx) you may also need to adjust client_max_body_size there.
# For embedded Tomcat, optionally adjust swallow size (set to -1 to disable limit):
server.tomcat.max-swallow-size=-1
