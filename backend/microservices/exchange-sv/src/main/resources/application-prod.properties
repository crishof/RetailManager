# =========================================
# PRODUCTION PROFILE - Application Properties
# =========================================
spring.datasource.url=jdbc:postgresql://${POSTGRES_NETWORK_HOST:postgres}:${POSTGRES_CONTAINER_PORT:5432}/${EXCHANGE_DB:exchange_db}
spring.datasource.username=${POSTGRES_USER:retailmanager}
spring.datasource.password=${POSTGRES_PASSWORD:RetailMgr2024!}
spring.rabbitmq.host=${RABBITMQ_NETWORK_HOST:rabbitmq}
logging.level.root=WARN
logging.level.org.springframework=INFO
logging.level.org.hibernate.SQL=WARN
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
management.endpoint.health.show-details=when_authorized
management.endpoints.web.exposure.include=health,info,metrics,prometheus
