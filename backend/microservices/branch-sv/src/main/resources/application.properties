spring.application.name=branch-sv
# =========================================
# APP SETTINGS
# =========================================
spring.application.name=branch-sv
server.port=8080
spring.profiles.active=${SPRING_ACTIVE_PROFILE:dev}

# =========================================
# DATASOURCE / POSTGRESQL
# =========================================
spring.datasource.url=${POSTGRES_URL:jdbc:postgresql://localhost:5544/branch_db}
spring.datasource.username=${POSTGRES_USER:retailmanager}
spring.datasource.password=${POSTGRES_PASSWORD:RetailMgr2024!}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database=POSTGRESQL
spring.sql.init.platform=postgres

# =========================================
# JPA / HIBERNATE
# =========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.open-in-view=false

# =========================================
# LOGGING
# =========================================
logging.level.org.springframework=info
logging.level.org.hibernate.SQL=warn

# =========================================
# HIKARI CONNECTION POOL
# =========================================
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.connection-timeout=30000

# =========================================
# ACTUATOR / MONITORING
# =========================================
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.info.env.enabled=true

# =========================================
# APPLICATION INFO
# =========================================
info.app.name=Branch Service
info.app.description=Manages branch operations
info.app.version=1.0.0

# =========================================
# SPRINGDOC / OPENAPI SWAGGER
# =========================================
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

# =========================================
# RABBITMQ CONFIGURATION
# =========================================
spring.rabbitmq.host=rabbitmq
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
