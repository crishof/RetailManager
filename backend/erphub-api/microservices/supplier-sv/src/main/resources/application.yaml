spring:
  application:
    name: supplier-sv
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  config:
    import: "${LOCAL_SPRING_CONFIG_IMPORT:${SPRING_CONFIG_IMPORT:optional:configserver:http://localhost:8088}}"
  lifecycle:
    timeout-per-shutdown-phase: 20s

server:
  shutdown: graceful

management:
  health:
    rabbit:
      enabled: false
