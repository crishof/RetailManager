spring:
  application:
    name: brand-sv
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  config:
    import: "${LOCAL_SPRING_CONFIG_IMPORT:${SPRING_CONFIG_IMPORT:optional:configserver:http://localhost:8088}}"
  cloud:
    openfeign:
      micrometer:
        enabled: false
  lifecycle:
    timeout-per-shutdown-phase: 20s

server:
  shutdown: graceful

resilience4j:
  circuitbreaker:
    metrics:
      enabled: false
  retry:
    metrics:
      enabled: false
  ratelimiter:
    metrics:
      enabled: false
  timelimiter:
    metrics:
      enabled: false
  bulkhead:
    metrics:
      enabled: false
