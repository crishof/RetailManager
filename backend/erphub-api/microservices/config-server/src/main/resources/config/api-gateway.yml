server:
  port: 8080

spring:
  application:
    name: api-gateway

  codec:
    max-in-memory-size: ${API_GATEWAY_MAX_IN_MEMORY_SIZE:30MB}

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: branch-sv
              uri: lb://BRANCH-SV
              predicates:
                - Path=/api/v1/branches/**

            - id: brand-sv
              uri: lb://BRAND-SV
              predicates:
                - Path=/api/v1/brands/**

            - id: cash-sv
              uri: lb://CASH-SV
              predicates:
                - Path=/api/v1/cash/**

            - id: category-sv
              uri: lb://CATEGORY-SV
              predicates:
                - Path=/api/v1/categories/**

            - id: customer-sv
              uri: lb://CUSTOMER-SV
              predicates:
                - Path=/api/v1/customers/**

            - id: exchange-sv
              uri: lb://EXCHANGE-SV
              predicates:
                - Path=/api/v1/exchange/**

            - id: identity-sv
              uri: lb://IDENTITY-SV
              predicates:
                - Path=/api/v1/identity/**

            - id: image-sv
              uri: lb://IMAGE-SV
              predicates:
                - Path=/api/v1/images/**

            - id: inventory-sv
              uri: lb://INVENTORY-SV
              predicates:
                - Path=/api/v1/inventory/**

            - id: location-sv
              uri: lb://LOCATION-SV
              predicates:
                - Path=/api/v1/locations/**

            - id: pricing-sv
              uri: lb://PRICING-SV
              predicates:
                - Path=/api/v1/pricing/**

            - id: product-sv
              uri: lb://PRODUCT-SV
              predicates:
                - Path=/api/v1/products/**

            - id: purchase-sv
              uri: lb://PURCHASE-SV
              predicates:
                - Path=/api/v1/purchases/**

            - id: reporting-sv
              uri: lb://REPORTING-SV
              predicates:
                - Path=/api/v1/reporting/**

            - id: sales-sv
              uri: lb://SALES-SV
              predicates:
                - Path=/api/v1/sales/**

            - id: supplier-catalog-sv
              uri: lb://SUPPLIER-CATALOG-SV
              predicates:
                - Path=/api/v1/price-items/**
              filters:
                - name: RequestSize
                  args:
                    maxSize: ${API_GATEWAY_SUPPLIER_CATALOG_MAX_REQUEST_SIZE:20MB}

            - id: supplier-sv
              uri: lb://SUPPLIER-SV
              predicates:
                - Path=/api/v1/suppliers/**

            - id: tenant-sv
              uri: lb://TENANT-SV
              predicates:
                - Path=/api/v1/tenants/**

          globalcors:
            add-to-simple-url-handler-mapping: true
            cors-configurations:
              '[/**]':
                allowedOrigins:
                  - "http://localhost:4200"
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - PATCH
                  - DELETE
                  - OPTIONS
                allowedHeaders: "*"
                allowCredentials: true
                maxAge: 3600

eureka:
  client:
    serviceUrl:
      defaultZone: http://service-registry:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
    registry-fetch-interval-seconds: 5
  instance:
    prefer-ip-address: true

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    org.springframework.cloud.gateway.route: TRACE
    org.springframework.cloud.loadbalancer: DEBUG