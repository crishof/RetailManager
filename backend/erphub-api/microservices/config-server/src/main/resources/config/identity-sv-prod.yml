# ============================
# PROD PROFILE - Production Ready
# ============================

server:
  port: ${PORT:8080}

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://${PGHOST}:${PGPORT:5432}/${PGDATABASE}}
    username: ${SPRING_DATASOURCE_USERNAME:${PGUSER}}
    password: ${SPRING_DATASOURCE_PASSWORD:${PGPASSWORD}}
    driver-class-name: org.postgresql.Driver
  jpa:
    database: POSTGRESQL
    hibernate:
      ddl-auto: update
    show-sql: false
  sql:
    init:
      platform: postgres
  mail:
    host: ${MAIL_HOST:smtp-relay.brevo.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS_ENABLE:true}
            required: ${MAIL_SMTP_STARTTLS_REQUIRED:true}
          ssl:
            enable: ${MAIL_SMTP_SSL_ENABLE:false}
          connectiontimeout: ${MAIL_SMTP_CONNECTION_TIMEOUT:30000}
          timeout: ${MAIL_SMTP_TIMEOUT:30000}
          writetimeout: ${MAIL_SMTP_WRITE_TIMEOUT:30000}

logging:
  level:
    root: WARN
    com.crishof: INFO

management:
  endpoint:
    health:
      show-details: never

app:
  mail:
    enabled: ${MAIL_ENABLED:true}
    provider: ${MAIL_PROVIDER:brevo-api}
  security:
    cors:
      allowed-origins: ${CORS_ALLOWED_ORIGINS:https://example.com}
  reset-password:
    base-url: ${RESET_PASSWORD_BASE_URL:https://example.com/reset-password}
  accept-invite:
    base-url: ${ACCEPT_INVITE_BASE_URL:https://example.com/accept-invite}

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

