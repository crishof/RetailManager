API_GATEWAY_MAX_IN_MEMORY_SIZE: 16MB
API_GATEWAY_SUPPLIER_CATALOG_MAX_REQUEST_SIZE: 12MB

spring:
  cloud:
    gateway:
      server:
        webflux:
          globalcors:
            cors-configurations:
              '[/**]':
                allowedOrigins:
                  - "${CORS_ALLOWED_ORIGINS:https://example.com}"
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - PATCH
                  - DELETE
                  - OPTIONS
                allowedHeaders: "*"
                allowCredentials: true
                maxAge: 3600

logging:
  level:
    org.springframework.cloud.gateway: WARN
    org.springframework.cloud.gateway.route: WARN
    org.springframework.cloud.loadbalancer: WARN

