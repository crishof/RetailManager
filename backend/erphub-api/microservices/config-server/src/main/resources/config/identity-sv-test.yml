spring:
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:${POSTGRES_NETWORK_HOST:${POSTGRES_LOCAL_HOST:localhost}}}:${POSTGRES_PORT:${POSTGRES_CONTAINER_PORT:${POSTGRES_HOST_PORT:5544}}}/${IDENTITY_DB:identity_db}
    username: ${POSTGRES_USER:admin}
    password: ${POSTGRES_PASSWORD:root1234}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  mail:
    host: localhost
    port: 2525

jwt:
  secret_key: MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=

app:
  mail:
    enabled: false
  reset-password:
    base-url: http://localhost:5173/reset-password
  accept-invite:
    base-url: http://localhost:5173/accept-invite

logging:
  level:
    root: WARN
    com.crishof: INFO

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

