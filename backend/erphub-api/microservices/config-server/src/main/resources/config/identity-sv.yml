server:
  port: ${PORT:9006}

spring:
  cloud:
    discovery:
      enabled: true
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:${POSTGRES_NETWORK_HOST:${POSTGRES_LOCAL_HOST:localhost}}}:${POSTGRES_PORT:${POSTGRES_CONTAINER_PORT:${POSTGRES_HOST_PORT:5544}}}/${IDENTITY_DB:identity_db}
    username: ${POSTGRES_USER:admin}
    password: ${POSTGRES_PASSWORD:root1234}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 3
      minimum-idle: 1
      idle-timeout: 30000
      max-lifetime: 600000
      connection-timeout: 20000
  rabbitmq:
    host: ${RABBITMQ_HOST:${RABBITMQ_NETWORK_HOST:${RABBITMQ_LOCAL_HOST:localhost}}}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_DEFAULT_USER:guest}
    password: ${RABBITMQ_DEFAULT_PASS:guest}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS_ENABLE:true}
  openfeign:
    circuitbreaker:
      enabled: true
eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}}
    register-with-eureka: true
    fetch-registry: true

logging:
  level:
    org.springframework: ${LOG_LEVEL_SPRING:INFO}

management:
  tracing:
    sampling:
      probability: 1.0
  health:
    circuitbreakers:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health,refresh,circuitbreakers,circuitbreakerevents,metrics
  endpoint:
    health:
      show-details: always

# JWT Configuration
jwt:
  secret_key: ${BASE64_SECRET_KEY:}
  expiration: ${JWT_EXPIRATION:900000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}

# Application Configuration
app:
  mail:
    enabled: ${MAIL_ENABLED:false}
    from: ${MAIL_FROM:${MAIL_USERNAME:no-reply@mail.local}}
    provider: ${MAIL_PROVIDER:smtp}
    brevo:
      api-url: ${BREVO_API_URL:https://api.brevo.com/v3}
      api-key: ${BREVO_API_KEY:}
      timeout-seconds: ${BREVO_API_TIMEOUT_SECONDS:15}
  email-verification:
    code-ttl-minutes: ${EMAIL_VERIFICATION_CODE_TTL_MINUTES:10}
  reset-password:
    base-url: ${RESET_PASSWORD_BASE_URL:http://localhost:5173/reset-password}
  accept-invite:
    base-url: ${ACCEPT_INVITE_BASE_URL:http://localhost:5173/accept-invite}
  security:
    cors:
      allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:4200,http://localhost:5173,http://127.0.0.1:3000}


resilience4j:
  circuitbreaker:
    instances:
      supplier-sv:
        registerHealthIndicator: true
        eventConsumerBufferSize: 10
        failureRateThreshold: 50
        minimumNumberOfCalls: 5
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 5s
        permittedNumberOfCallsInHalfOpenState: 3
        slidingWindowSize: 10
        slidingWindowType: COUNT_BASED
  retry:
    instances:
      supplier-sv:
        maxRetryAttempts: 5
        waitDuration: 10s
  ratelimiter:
    instances:
      supplier-sv:
        limitForPeriod: 10
        limitRefreshPeriod: 5s
        timeoutDuration: 10s
        registerHealthIndicator: true
        eventConsumerBufferSize: 100
  timelimiter:
    instances:
      supplier-sv:
        timeoutDuration: 2s
        cancelRunningFuture: true
  bulkhead:
    instances:
      suppliers-sv:
        maxWaitDuration: 5s
        maxConcurrentCalls: 5

default:
  message: Hi