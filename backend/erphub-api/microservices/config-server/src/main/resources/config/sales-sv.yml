server:
  port: 9014

spring:
  cloud:
    discovery:
      enabled: true
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:${POSTGRES_NETWORK_HOST:${POSTGRES_LOCAL_HOST:localhost}}}:${POSTGRES_PORT:${POSTGRES_CONTAINER_PORT:${POSTGRES_HOST_PORT:5544}}}/${SALES_DB:sales_db}
    username: ${POSTGRES_USER:admin}
    password: ${POSTGRES_PASSWORD:root1234}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 3
      minimum-idle: 1
      idle-timeout: 30000
      max-lifetime: 600000
      connection-timeout: 20000
  rabbitmq:
    host: ${RABBITMQ_HOST:${RABBITMQ_NETWORK_HOST:${RABBITMQ_LOCAL_HOST:localhost}}}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_DEFAULT_USER:guest}
    password: ${RABBITMQ_DEFAULT_PASS:guest}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  openfeign:
    circuitbreaker:
      enabled: true
eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}}
    register-with-eureka: true
    fetch-registry: true

logging:
  level:
    org.springframework: ${LOG_LEVEL_SPRING:INFO}

management:
  tracing:
    sampling:
      probability: 1.0
  health:
    circuitbreakers:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health,refresh,circuitbreakers,circuitbreakerevents,metrics
  endpoint:
    health:
      show-details: always

resilience4j:
  circuitbreaker:
    instances:
      inventory-sv:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 5s
        failureRateThreshold: 50
        eventConsumerBufferSize: 10

default:
  message: Hi