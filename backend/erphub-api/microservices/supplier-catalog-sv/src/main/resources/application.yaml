spring:
  application:
    name: supplier-catalog-sv
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  config:
    import: "${LOCAL_SPRING_CONFIG_IMPORT:${SPRING_CONFIG_IMPORT:optional:configserver:http://localhost:8088}}"
  servlet:
    multipart:
      # Fallback local cuando Config Server no esta disponible.
      max-file-size: ${SUPPLIER_CATALOG_MAX_FILE_SIZE:20MB}
      max-request-size: ${SUPPLIER_CATALOG_MAX_REQUEST_SIZE:20MB}

server:
  tomcat:
    max-swallow-size: ${SUPPLIER_CATALOG_MAX_SWALLOW_SIZE:20MB}
