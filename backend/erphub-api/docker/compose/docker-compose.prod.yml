# =============================================================
# docker-compose.prod.yml — Stack completo de producción
# =============================================================
# Uso:
#   docker compose -f docker-compose.prod.yml up -d
#   docker compose -f docker-compose.prod.yml up -d --build   # rebuild imágenes
#   docker compose -f docker-compose.prod.yml logs -f         # seguir logs
#   docker compose -f docker-compose.prod.yml down            # detener
#
# Prerrequisitos: exportar todas las variables requeridas en el sistema:
#   export POSTGRES_USER=...
#   export POSTGRES_PASSWORD=...
#   export RABBITMQ_DEFAULT_USER=...
#   export RABBITMQ_DEFAULT_PASS=...
#   export CORS_ALLOWED_ORIGINS=https://tu-dominio.com
#
# Ver .env.example para la lista completa de variables.
# =============================================================

services:

  # ===========================================================
  # INFRAESTRUCTURA
  # ===========================================================

  postgres:
    image: postgres:17-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../postgres/init:/docker-entrypoint-initdb.d/:ro
    networks:
      - erphub-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    # Puerto NO expuesto al host en PROD (solo accesible dentro de la red Docker)

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - erphub-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    # Puerto AMQP y management UI NO expuestos al host en PROD

  service-registry:
    build:
      context: ../../microservices
      dockerfile: service-registry/Dockerfile
    container_name: service-registry
    environment:
      SPRING_PROFILES_ACTIVE: prod
      LOG_LEVEL_SPRING: WARN
    networks:
      - erphub-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8761/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    # Dashboard Eureka (8761) NO expuesto al host en PROD

  config-server:
    build:
      context: ../../microservices
      dockerfile: config-server/Dockerfile
    container_name: config-server
    environment:
      SPRING_PROFILES_ACTIVE: native
      SPRING_CLOUD_CONFIG_ENABLED: "false"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://service-registry:8761/eureka/
    depends_on:
      service-registry:
        condition: service_healthy
    networks:
      - erphub-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8088/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    # Config Server (8088) NO expuesto al host en PROD

  api-gateway:
    build:
      context: ../../microservices
      dockerfile: api-gateway/Dockerfile
    container_name: api-gateway
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_CONFIG_IMPORT: "configserver:http://config-server:8088"
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      LOG_LEVEL_SPRING: WARN
    ports:
      - "8080:8080"
    depends_on:
      config-server:
        condition: service_healthy
      service-registry:
        condition: service_healthy
    networks:
      - erphub-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

