services:

  # =========================================================
  # INFRASTRUCTURE
  # =========================================================

  postgres:
    image: postgres:17
    container_name: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5544:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../postgres/init:/docker-entrypoint-initdb.d/
    networks:
      - erp-net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    networks:
      - erp-net
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
  # =========================================================
  # API GATEWAY (SINGLE ENTRY POINT)
  # =========================================================

  gateway-sv:
    build: ../../microservices/gateway-sv
    container_name: gateway-sv
    ports:
      - "8080:8080"
    networks:
      - erp-net
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:8080/actuator/health" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # =========================================================
  # CORE MICROSERVICES (INTERNAL ONLY)
  # =========================================================

  brand-sv:
    build: ../../microservices/brand-sv
    container_name: brand-sv
    env_file:
      - .env
      - ../../microservices/brand-sv/.env
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - erp-net
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep UP || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5

  category-sv:
    build: ../../microservices/category-sv
    container_name: category-sv
    env_file:
      - .env
      - ../../microservices/category-sv/.env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - erp-net
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep UP || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5

  supplier-sv:
    build: ../../microservices/supplier-sv
    container_name: supplier-sv
    env_file:
      - .env
      - ../../microservices/supplier-sv/.env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - erp-net
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep UP || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5

  image-sv:
    build:
      context: ../../microservices/image-sv
    container_name: image-sv
    env_file:
      - .env
      - ../../microservices/image-sv/.env
    depends_on:
