services:

  # =========================================================
  # INFRASTRUCTURE LAYER
  # =========================================================

  postgres:
    image: postgres:17-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_DB_PORT}:${POSTGRES_CONTAINER_PORT}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../postgres/init:/docker-entrypoint-initdb.d/:ro
    networks:
      - retailmanager-net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    ports:
      - "${RABBITMQ_PORT}:${RABBITMQ_PORT}"
      - "${RABBITMQ_MGMT_PORT}:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - retailmanager-net
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # =========================================================
  # API GATEWAY (SINGLE ENTRY POINT)
  # =========================================================

  gateway-sv:
    build:
      context: ../../microservices
      dockerfile: gateway-sv/Dockerfile
    container_name: gateway-sv
    env_file:
      - ../../microservices/gateway-sv/.env
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      LOG_LEVEL_SPRING: ${LOG_LEVEL_SPRING}
    ports:
      - "${GATEWAY_PORT}:${GATEWAY_CONTAINER_PORT}"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - retailmanager-net
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:${GATEWAY_CONTAINER_PORT}/actuator/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

