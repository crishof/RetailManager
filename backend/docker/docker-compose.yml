services:

  # =========================================================
  # INFRASTRUCTURE
  # =========================================================

  # -----------------------------
  # PostgreSQL Database
  # -----------------------------
  postgres:
    image: postgres:17
    container_name: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5544:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d/
    networks:
      - erp-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # -----------------------------
  # PgAdmin
  # -----------------------------
  pg-admin:
    image: dpage/pgadmin4:latest
    container_name: pg-admin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@local.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - erp-net

  # =========================================================
  # CORE MICROSERVICES
  # =========================================================

  # -----------------------------
  # Brand Service
  # -----------------------------
  brand-sv:
    build:
      context: ../microservices/brand-sv
    container_name: brand-sv
    env_file:
      - ../docker/.env
      - ../microservices/brand-sv/.env
    ports:
      - "${BRAND_SV_PORT}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - erp-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/brands/actuator/health | grep UP || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -----------------------------
  # Category Service
  # -----------------------------
  category-sv:
    build:
      context: ../microservices/category-sv
    container_name: category-sv
    env_file:
      - ../docker/.env
      - ../microservices/category-sv/.env
    ports:
      - "${CATEGORY_SV_PORT}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - erp-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/categories/actuator/health | grep UP || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -----------------------------
  # Supplier Price List Service
  # -----------------------------
  price-item-sv:
