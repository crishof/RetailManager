      retries: 5

  # -----------------------------
  # Pricing Service
  # -----------------------------
  pricing-sv:
    build:
      context: ../microservices/pricing-sv
    container_name: pricing-sv
    env_file:
      - ../docker/.env
      - ../microservices/pricing-sv/.env
    ports:
      - "${PRICING_SV_PORT}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - erp-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/pricing/actuator/health | grep UP || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -----------------------------
  # Product Service
  # -----------------------------
  product-sv:
    build:
      context: ../microservices/product-sv
    container_name: product-sv
    env_file:
