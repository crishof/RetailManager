      interval: 10s
      timeout: 5s
      retries: 5

  # =========================================================
  # GATEWAY
  # =========================================================

  nginx:
    build:
      context: ./nginx
    container_name: nginx
    ports:
      - "80:80"
    depends_on:
      - brand-sv
      - category-sv
      - product-sv
      - customer-sv
      - image-sv
      - inventory-sv
      - supplier-sv
      - pricing-sv
      - sales-sv
      - price-item-sv
      - exchange-sv
    networks:
      - erp-net

# =========================================================
