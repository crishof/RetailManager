    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/suppliers/actuator/health | grep UP || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -----------------------------
  # Exchange Service
  # -----------------------------
  exchange-sv:
    build:
      context: ../microservices/exchange-sv
    container_name: exchange-sv
    env_file:
