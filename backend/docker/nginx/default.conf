server {
    listen 80;

    # =========================================================
    # API GATEWAY — RETAIL MANAGER MICROSERVICES
    # =========================================================

    # ---------------------------------------------------------
    # Brand Service
    # ---------------------------------------------------------
    location /api/v1/brands {
        proxy_pass http://brand-sv:8080/api/v1/brands;
    }

    # ---------------------------------------------------------
    # Category Service
    # ---------------------------------------------------------
    location /api/v1/categories {
        proxy_pass http://category-sv:8080/api/v1/categories;
    }

    # ---------------------------------------------------------
    # Supplier Price List Service
    # ---------------------------------------------------------
    location /api/v1/price-items {
        proxy_pass http://supplier-price-list-sv:8080/api/v1/price-items;
    }

    location /api/v1/import-jobs {
        proxy_pass http://supplier-price-list-sv:8080/api/v1/import-jobs;
    }

    # ---------------------------------------------------------
    # Customer Service
    # ---------------------------------------------------------
    location /api/v1/customers {
        proxy_pass http://customer-sv:8080/api/v1/customers;
    }

    # ---------------------------------------------------------
    # Image Service
    # ---------------------------------------------------------
    location /api/v1/images {
        proxy_pass http://image-sv:8080/api/v1/images;
    }

    # ---------------------------------------------------------
    # Inventory Service
    # ---------------------------------------------------------
    location /api/v1/inventory {
        proxy_pass http://inventory-sv:8080/api/v1/inventory;
    }

    # ---------------------------------------------------------
    # Pricing Service
    # ---------------------------------------------------------
    location /api/v1/pricing {
        proxy_pass http://pricing-sv:8080/api/v1/pricing;
    }

    # ---------------------------------------------------------
    # Product Service
    # ---------------------------------------------------------
    location /api/v1/products {
        proxy_pass http://product-sv:8080/api/v1/products;
    }

    location /api/v1/products/import {
        proxy_pass http://product-sv:8080/api/v1/products/import;
    }

    location /api/v1/products/stock {
        proxy_pass http://product-sv:8080/api/v1/products/stock;
    }

    # ---------------------------------------------------------
    # Sales Service
    # ---------------------------------------------------------
    location /api/v1/sales {
        proxy_pass http://sales-sv:8080/api/v1/sales;
    }

    # ---------------------------------------------------------
    # Supplier Service
    # ---------------------------------------------------------
    location /api/v1/suppliers {
        proxy_pass http://supplier-sv:8080/api/v1/suppliers;
    }

    # ---------------------------------------------------------
    # Currency Exchange Service
    # ---------------------------------------------------------
    location /api/v1/exchange-rates {
        proxy_pass http://exchange-sv:8080/api/v1/exchange-rates;
    }

    # =========================================================
    # ACTUATOR / OBSERVABILITY ENDPOINTS
    # =========================================================

    location /brands/actuator {
        proxy_pass http://brand-sv:8080/brands/actuator;
    }

    location /categories/actuator {
        proxy_pass http://category-sv:8080/categories/actuator;
    }

    location /products/actuator {
        proxy_pass http://product-sv:8080/products/actuator;
    }

    location /pricing/actuator {
        proxy_pass http://pricing-sv:8080/pricing/actuator;
    }

    location /inventory/actuator {
        proxy_pass http://inventory-sv:8080/inventory/actuator;
    }

    location /sales/actuator {
        proxy_pass http://sales-sv:8080/sales/actuator;
    }

    location /suppliers/actuator {
        proxy_pass http://supplier-sv:8080/suppliers/actuator;
    }

    location /customers/actuator {
        proxy_pass http://customer-sv:8080/customers/actuator;
    }

    location /images/actuator {
        proxy_pass http://image-sv:8080/images/actuator;
    }

    location /exchange/actuator {
        proxy_pass http://exchange-sv:8080/exchange/actuator;
    }

    location /price-items/actuator {
            proxy_pass http://supplier-price-list-sv:8080/price-items/actuator;
        }
}