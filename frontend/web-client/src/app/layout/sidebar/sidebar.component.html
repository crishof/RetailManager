<aside class="sidebar" [class.sidebar--collapsed]="collapsed" aria-label="Menú de navegación principal">

  <!-- Logo / Brand -->
  <a class="sidebar__header" [routerLink]="['/']" title="Ir a la landing">
    <div class="sidebar__logo">
      <div class="sidebar__logo-icon-wrap">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M4 4h4v4H4zm6 0h4v4h-4zm6 0h4v4h-4zM4 10h4v4H4zm6 0h4v4h-4zm6 0h4v4h-4zM4 16h4v4H4zm6 0h4v4h-4zm6 0h4v4h-4z"/>
        </svg>
      </div>
      @if (!collapsed) {
        <span class="sidebar__logo-text">Retail<span class="sidebar__logo-accent">Manager</span></span>
      }
    </div>
  </a>

  <!-- Nav content -->
  <nav class="sidebar__nav">
    @for (section of sections; track section.title) {
      <div class="sidebar__section">
        @if (!collapsed) {
          <p class="sidebar__section-label">{{ section.title }}</p>
        }
        @for (item of section.items; track item.label) {
          <a
            class="sidebar__item"
            [routerLink]="item.route"
            routerLinkActive="sidebar__item--active"
            [routerLinkActiveOptions]="{ exact: item.route === '/' }"
            [title]="collapsed ? item.label : ''"
          >
            <span class="material-icons sidebar__item-icon">{{ item.icon }}</span>
            @if (!collapsed) {
              <span class="sidebar__item-label">{{ item.label }}</span>
            }
          </a>
        }
      </div>
    }
  </nav>

  <!-- Footer -->
  <div class="sidebar__footer">
    @if (!collapsed) {
      <p class="sidebar__footer-text">v1.0.0 &bull; RetailManager</p>
    }
  </div>

</aside>
