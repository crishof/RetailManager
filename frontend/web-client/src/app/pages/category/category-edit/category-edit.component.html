<div class="container">
  <!-- FORMULARIO PARA NOMBRE -->
  <form
    [formGroup]="categoryForm"
    class="g-3 needs-validation"
    novalidate
    (submit)="save($event)"
  >
    <div class="mb-3">
      <label for="categoryNameInput" class="form-label">Category Name:</label>
      <input
        type="text"
        class="form-control"
        id="categoryNameInput"
        placeholder="Type new name here"
        formControlName="categoryName"
        [ngClass]="{ 'is-invalid': hasErrors('categoryName', 'required') }"
      />
      <div *ngIf="hasErrors('categoryName', 'required')" class="text-danger">
        Category name cannot be empty
      </div>
    </div>
    <button type="submit" class="btn btn-outline-primary btn-sm">
      Update Name
    </button>
    <button
      type="button"
      class="btn btn-secondary btn-sm ms-2"
      (click)="cancel()"
    >
      Cancel
    </button>
  </form>
</div>

<hr />

<div class="container">
  <!-- FORMULARIO PARA IMAGEN -->
  <form class="g-3">
    <div class="mb-3">
      <label for="formFile" class="form-label">Image:</label>
      <input
        class="form-control"
        type="file"
        id="formFile"
        (change)="onFileSelected($event)"
      />
    </div>
    <button
      type="button"
      class="btn btn-outline-primary btn-sm"
      [disabled]="!selectedFile"
      (click)="updateImage()"
    >
      Update Image
    </button>
  </form>
</div>
<hr />
