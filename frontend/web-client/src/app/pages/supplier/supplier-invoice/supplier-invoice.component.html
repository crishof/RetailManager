<form [formGroup]="invoiceForm" (ngSubmit)="saveInvoice()" class="mb-3">
  <!-- PROVEEDOR -->
  <div class="row mb-3">
    <div class="col-md-6">
      <select class="form-control form-control-sm" formControlName="supplierId">
        <option value="">Select supplier</option>
        <option *ngFor="let supplier of suppliers" [value]="supplier.id">
          {{ supplier.name }}
        </option>
      </select>
    </div>

    <div class="col-md-3">
      <button type="submit" class="btn btn-outline-primary btn-sm">
        Save Invoice
      </button>
    </div>
  </div>

  <!-- TABS -->
  <div class="btn-group btn-group-sm mb-3">
    <button
      type="button"
      class="btn btn-outline-secondary"
      [ngClass]="{ active: selectedComponent === 'header' }"
      (click)="selectedComponent = 'header'"
    >
      Header
    </button>
    <button
      type="button"
      class="btn btn-outline-secondary"
      [ngClass]="{ active: selectedComponent === 'items' }"
      (click)="selectedComponent = 'items'"
    >
      Items
    </button>
    <button
      type="button"
      class="btn btn-outline-secondary"
      [ngClass]="{ active: selectedComponent === 'pagos' }"
      (click)="selectedComponent = 'pagos'"
    >
      Pagos
    </button>
  </div>

  <!-- SWITCH -->
  <ng-container [ngSwitch]="selectedComponent">
    <div *ngSwitchCase="'items'">
      <app-invoice-items
        [invoiceItems]="invoiceItems"
        (invoiceItemsChange)="onInvoiceItemChange($event)"
      ></app-invoice-items>
    </div>

    <div *ngSwitchCase="'pagos'">
      <p>Pagos</p>
    </div>
  </ng-container>
</form>
