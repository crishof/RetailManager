<div class="snav">
  <div class="snav__group">
    <button class="snav__btn snav__btn--primary" type="button" title="Nuevo proveedor" (click)="onNewSupplierClick($event)">
      <span class="material-icons">add</span>
      <span>Nuevo</span>
    </button>
    <button class="snav__btn" type="button" title="Editar proveedor" [disabled]="!selectedSupplier" (click)="onEditSupplierClick($event)">
      <span class="material-icons">edit</span>
      <span>Editar</span>
    </button>
    <button class="snav__btn snav__btn--danger" type="button" title="Eliminar proveedor">
      <span class="material-icons">delete_outline</span>
      <span>Eliminar</span>
    </button>
  </div>

  <div class="snav__sep"></div>

  <div class="snav__dropdown" [class.snav__dropdown--open]="openMenu === 'listados'">
    <button class="snav__btn" type="button" (click)="toggleMenu('listados')">
      <span class="material-icons">list_alt</span>
      <span>Listados</span>
      <span class="material-icons snav__chev">expand_more</span>
    </button>
    <div class="snav__menu">
      <button class="snav__menu-item" type="button">Listado de proveedores</button>
      <button class="snav__menu-item" type="button">Listado de servicios técnicos</button>
      <button class="snav__menu-item" type="button">Listado de profesores</button>
      <button class="snav__menu-item" type="button">Listado de consignatarios</button>
      <button class="snav__menu-item" type="button">Listado de extranjeros</button>
      <button class="snav__menu-item" type="button">Listado de distribución propia</button>
    </div>
  </div>

  <div class="snav__dropdown" [class.snav__dropdown--open]="openMenu === 'informes'">
    <button class="snav__btn" type="button" (click)="toggleMenu('informes')">
      <span class="material-icons">assessment</span>
      <span>Informes</span>
      <span class="material-icons snav__chev">expand_more</span>
    </button>
    <div class="snav__menu">
      @if (selectedSupplier) {
        <button class="snav__menu-item" type="button" (click)="toStatementAccount(selectedSupplier.id)">
          Statement of Account
        </button>
      } @else {
        <button class="snav__menu-item" type="button" disabled>
          Statement of Account (seleccioná proveedor)
        </button>
      }
      <button class="snav__menu-item" type="button">Cheques entregados al proveedor</button>
      <div class="snav__menu-divider"></div>
      <button class="snav__menu-item" type="button">Saldo de todos los proveedores</button>
      <button class="snav__menu-item" type="button">Estado de deuda a los proveedores</button>
      <button class="snav__menu-item" type="button">Factura, remitos NC y ND</button>
      <button class="snav__menu-item" type="button">Pagos realizados a los proveedores</button>
      <div class="snav__menu-divider"></div>
      <div class="snav__menu-heading">Pagos pendientes</div>
      <button class="snav__menu-item" type="button">Listado de pagos pendientes</button>
      <button class="snav__menu-item" type="button">Calendario de pagos pendientes</button>
      <button class="snav__menu-item" type="button">Facturas a cancelar</button>
    </div>
  </div>

  <div class="snav__dropdown" [class.snav__dropdown--open]="openMenu === 'acciones'">
    <button class="snav__btn" type="button" (click)="toggleMenu('acciones')">
      <span class="material-icons">build</span>
      <span>Acciones</span>
      <span class="material-icons snav__chev">expand_more</span>
    </button>
    <div class="snav__menu">
      <button class="snav__menu-item" type="button">Pedidos al proveedor</button>
      <a class="snav__menu-item snav__menu-item--link" routerLink="/supplierInvoice">Ingreso de comprobantes</a>
      <button class="snav__menu-item" type="button">Ingreso automático de facturas</button>
      <button class="snav__menu-item" type="button">Ingreso de remito</button>
      <button class="snav__menu-item" type="button">Relacionar proveedores</button>
      <button class="snav__menu-item" type="button">Unificar proveedores</button>
      <button class="snav__menu-item" type="button">Actualizar proveedores por grupo de artículos</button>
      <button class="snav__menu-item" type="button">Importar proveedores desde excel</button>
    </div>
  </div>

  <div class="snav__spacer"></div>

  <button class="snav__btn" type="button" title="Viajantes">
    <span class="material-icons">badge</span>
    <span>Viajantes</span>
  </button>

  <button class="snav__btn" type="button" title="Modificación rápida del dolar">
    <span class="material-icons">currency_exchange</span>
    <span>Dólar rápido</span>
  </button>
</div>
