@if (!isLanding()) {
  <app-sidebar [collapsed]="sidebarCollapsed"></app-sidebar>
}

<div [class]="isLanding() ? '' : 'app-shell'" [class.app-shell--collapsed]="!isLanding() && sidebarCollapsed">
  @if (!isLanding()) {
    <app-topbar
      [sidebarCollapsed]="sidebarCollapsed"
      (toggleSidebar)="toggleSidebar()"
    ></app-topbar>
  }

  <main [class]="isLanding() ? '' : 'app-shell__content'">
    <router-outlet></router-outlet>
  </main>
</div>
