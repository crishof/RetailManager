<div class="container">
  <table class="table table-striped table-hover align-middle">
    <thead class="table-dark">
      <tr>
        <th scope="col">#Id</th>
        <th scope="col">Name</th>
        <th scope="col">Image</th>
        <th scope="col">Details</th>
      </tr>
    </thead>
    <tbody>
      <tr
        *ngFor="let category of categoryList; let i = index"
        (click
        |
        onkeypress)="showDetails(category)"
        tabindex="0"
      >
        <td>{{ category.id }}</td>
        <td>{{ category.name }}</td>
        <td>
          <img [src]="getImageUrl(category)" alt="" width="50" height="50" />
        </td>
        <td>
          <button
            class="btn btn-outline-primary btn-sm"
            (click)="openCategoryEditDialog(); $event.stopPropagation()"
          >
            Edit
          </button>
          <button
            class="btn btn-outline-secondary btn-sm ms-1"
            (click)="navigateToDetails(category.id); $event.stopPropagation()"
          >
            Details
          </button>
        </td>
      </tr>
    </tbody>
  </table>
</div>

<!-- Modal para Category Details -->
<div
  class="modal fade modal-dialog-scrollable"
  id="categoryDetailsModal"
  tabindex="-1"
  aria-labelledby="categoryDetailsModalLabel"
  aria-hidden="true"
>
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="categoryDetailsModalLabel">
          Category Details
        </h5>
        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="modal"
          aria-label="Close"
        ></button>
      </div>
      <div class="modal-body">
        <app-category-details
          [selectedCategory]="selectedCategory"
          (categoryUpdated)="loadCategories()"
        ></app-category-details>
      </div>
    </div>
  </div>
</div>
