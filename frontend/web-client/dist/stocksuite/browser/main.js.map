<div class="container">
  <form
    [formGroup]="brandForm"
    enctype="multipart/form-data"
    class="g-3 needs-validation"
    novalidate
    (submit)="updateBrand($event)"
  >
    <!-- BRAND NAME -->
    <div class="mb-3">
      <label for="brandNameInput" class="form-label">Brand Name</label>

      <input
        type="text"
        class="form-control"
        id="brandNameInput"
        formControlName="brandName"
        placeholder="Type new brand name here"
        [ngClass]="{ 'is-invalid': hasErrors('brandName', 'required') }"
      />

      <div *ngIf="hasErrors('brandName', 'required')" class="invalid-feedback">
        Brand name cannot be empty
      </div>
    </div>

    <!-- LOGO -->
    <div class="mb-3">
      <label for="formFile" class="form-label">Logo (optional)</label>
      <input
        class="form-control"
        type="file"
        id="formFile"
        accept="image/*"
        (change)="onFileSelected($event)"
      />
    </div>

    <!-- ERROR MESSAGE -->
    <div *ngIf="errorMessage" class="alert alert-danger">
      {{ errorMessage }}
    </div>

    <!-- ACTIONS -->
    <div class="d-flex gap-2">
      <button type="submit" class="btn btn-outline-primary btn-sm">
        Update
      </button>

      <button
        type="button"
        class="btn btn-outline-secondary btn-sm"
        (click)="cancelar()"
      >
        Cancel
      </button>
    </div>
  </form>
</div>
